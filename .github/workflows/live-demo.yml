name: Live Demo

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "cmd/**"
      - "internal/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "configs/**"
      - ".github/workflows/live-demo.yml"

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Build container
        run: docker build -t ntp-server:demo .

      - name: Run container
        run: |
          docker run -d --name ntp-server-demo \
            -p 12300:12300/udp \
            -p 8080:8080/tcp \
            ntp-server:demo

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Wait for upstream sync
        run: |
          echo "Waiting 20s for upstream NTP sync..."
          sleep 20
          curl -fsS http://127.0.0.1:8080/v1/status | python3 -c "import sys,json; d=json.load(sys.stdin); print('synced:', d['synced'], '| stratum:', d['stratum'], '| upstream:', d.get('upstream',''))"

      - name: Collect results and write demo-result.json
        run: |
          curl -fsS http://127.0.0.1:8080/v1/status > /tmp/status.json
          go run ./cmd/ntp-query -server 127.0.0.1:12300 > /tmp/ntp.json
          echo "--- status ---"
          cat /tmp/status.json
          echo "--- ntp ---"
          cat /tmp/ntp.json

          python3 - <<'PYEOF'
          import json, datetime

          with open('/tmp/status.json') as f:
              status = json.load(f)

          with open('/tmp/ntp.json') as f:
              ntp = json.load(f)

          result = {
              "runAt":  datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "ntp":    ntp,
              "status": status,
          }

          with open("docs/demo-result.json", "w") as f:
              json.dump(result, f, indent=2)

          print(json.dumps(result, indent=2))
          PYEOF

      - name: Commit demo result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/demo-result.json
          git stash
          git pull --rebase
          git stash pop
          git add docs/demo-result.json
          git diff --cached --quiet || git commit -m "chore: update live demo result [skip ci]"
          git push

      - name: Logs
        if: always()
        run: docker logs ntp-server-demo

      - name: Cleanup
        if: always()
        run: docker rm -f ntp-server-demo
