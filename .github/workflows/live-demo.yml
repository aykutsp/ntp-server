name: Live Demo

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "cmd/**"
      - "internal/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "configs/**"
      - ".github/workflows/live-demo.yml"

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Build container
        run: docker build -t ntp-server:demo .

      - name: Run container
        run: |
          docker run -d --name ntp-server-demo \
            -p 12300:12300/udp \
            -p 8080:8080/tcp \
            ntp-server:demo

      - name: Wait API
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become healthy in time"
          docker logs ntp-server-demo
          exit 1

      - name: Show health
        run: curl -fsS http://127.0.0.1:8080/healthz

      - name: Collect status
        id: status
        run: |
          STATUS=$(curl -fsS http://127.0.0.1:8080/v1/status)
          echo "$STATUS"
          echo "json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$STATUS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: NTP query demo
        id: ntpquery
        run: |
          RESULT=$(go run ./cmd/ntp-query -server 127.0.0.1:12300)
          echo "$RESULT"
          echo "json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Write demo-result.json
        run: |
          python3 - <<'PYEOF'
          import json, datetime

          ntp_raw = '''${{ steps.ntpquery.outputs.json }}'''
          status_raw = '''${{ steps.status.outputs.json }}'''

          try:
              ntp = json.loads(ntp_raw)
          except Exception:
              ntp = {}

          try:
              status = json.loads(status_raw)
          except Exception:
              status = {}

          result = {
              "runAt": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "ntp": ntp,
              "status": status,
          }

          with open("docs/demo-result.json", "w") as f:
              json.dump(result, f, indent=2)

          print(json.dumps(result, indent=2))
          PYEOF

      - name: Commit demo result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/demo-result.json
          git diff --cached --quiet || git commit -m "chore: update live demo result [skip ci]"
          git push

      - name: Logs
        if: always()
        run: docker logs ntp-server-demo

      - name: Cleanup
        if: always()
        run: docker rm -f ntp-server-demo
